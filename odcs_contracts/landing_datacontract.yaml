dataContractSpecification: 3.1.0
id: deftunes-landing-zone-v1
info:
  title: DefTunes Raw Landing Data
  version: 2.0.0
  description: Raw NDJSON data containing users, songs, sessions, and user feedback ingested into Google Cloud Storage and loaded to BigQuery.
  owner: Data Engineering Team
  contact:
    name: Gourav Chugh
    url: https://github.com/Chugh-Gourav/deftunes_data_engineering_rag_capstone

servers:
  bigquery_landing:
    type: bigquery
    project: ai-data-product-work
    dataset: deftunes_landing_zone

dataset:
  domain: Music Streaming
  
models:
  raw_users:
    description: Raw user demographic and account registration data.
    type: table
    fields:
      user_id:
        type: string
        description: Unique identifier for the user generated by Random User API.
        required: true
        primary: true
      user_name:
        type: string
        description: First name of the user.
      user_lastname:
        type: string
        description: Last name of the user.
      user_since:
        type: date
        description: Registration date of the user in YYYY-MM-DD format.
      place_name:
        type: string
        description: City where the user is located.
      country_code:
        type: string
        description: Two-letter country code.

  raw_songs:
    description: Raw catalog of songs and artist details sourced from iTunes Search API.
    type: table
    fields:
      song_id:
        type: string
        description: Unique UUID for the song.
        required: true
        primary: true
      track_id:
        type: string
        description: Secondary tracking identifier.
      title:
        type: string
        description: Title of the song.
      release:
        type: string
        description: Genre or release category of the song.
      year:
        type: integer
        description: Year the song was released.
      artist_id:
        type: string
        description: Internal unique identifier for the artist.
      artist_mbid:
        type: string
        description: External identifier for the artist.
      artist_name:
        type: string
        description: Name of the artist or band.

  raw_sessions:
    description: Raw logs of user listening sessions.
    type: table
    fields:
      session_id:
        type: string
        description: Unique identifier for the listening session.
        required: true
        primary: true
      user_id:
        type: string
        description: Identifier of the user (foreign key to raw_users).
        required: true
      song_id:
        type: string
        description: Identifier of the song (foreign key to raw_songs).
        required: true
      artist_id:
        type: string
        description: Identifier of the artist.
      session_start_time:
        type: timestamp
        description: Timestamp when the listening session began.

  raw_user_feedback:
    description: Explicit user interaction feedback on songs (likes, dislikes, skips, playlist additions).
    type: table
    fields:
      feedback_id:
        type: string
        description: Unique identifier for the feedback event.
        required: true
        primary: true
      user_id:
        type: string
        description: Identifier of the user (foreign key to raw_users).
        required: true
      song_id:
        type: string
        description: Identifier of the song (foreign key to raw_songs).
        required: true
      action:
        type: string
        description: "Type of interaction: LIKE, DISLIKE, SKIP, or ADD_TO_PLAYLIST."
      timestamp:
        type: timestamp
        description: Timestamp when the feedback was given.

quality:
  specification: soda
  rules:
    - row_count(raw_users) > 0
    - row_count(raw_songs) > 0
    - row_count(raw_sessions) > 0
    - row_count(raw_user_feedback) > 0
    - duplicate_count(raw_users.user_id) = 0
    - duplicate_count(raw_songs.song_id) = 0
    - duplicate_count(raw_sessions.session_id) = 0
    - duplicate_count(raw_user_feedback.feedback_id) = 0

servicelevels:
  availability:
    percentage: 99.9
  freshness:
    timestampField: session_start_time
    maxDelay: 24h
