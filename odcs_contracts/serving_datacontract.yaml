dataContractSpecification: 3.1.0
id: deftunes-serving-analytics-v1
info:
  title: DefTunes Core Analytics Models
  version: 2.0.0
  description: Cleaned and structured serving layer models and Business Intelligence views generated by dbt.
  owner: Data Analytics Team
  contact:
    name: Gourav Chugh
    url: https://github.com/Chugh-Gourav/deftunes_data_engineering_rag_capstone

servers:
  bigquery_serving:
    type: bigquery
    project: ai-data-product-work
    dataset: deftunes_transform_db

dataset:
  domain: Business Intelligence

models:
  fact_session:
    description: Cleaned listening session facts linking users, songs, and artists.
    type: table
    fields:
      session_id:
        type: string
        description: Unique identifier for the listening session.
        required: true
        primary: true
      user_id:
        type: string
        description: Foreign key to dim_users.
      song_id:
        type: string
        description: Foreign key to dim_songs.
      artist_id:
        type: string
        description: Foreign key to dim_artists.
      session_start_time:
        type: timestamp
        description: Timestamp when the listening session began.

  fact_feedback:
    description: Explicit user interaction feedback on songs.
    type: table
    fields:
      feedback_id:
        type: string
        description: Unique identifier for the feedback event.
        required: true
        primary: true
      user_id:
        type: string
        description: Foreign key to dim_users.
      song_id:
        type: string
        description: Foreign key to dim_songs.
      action:
        type: string
        description: "Type of interaction: LIKE, DISLIKE, SKIP, or ADD_TO_PLAYLIST."
      timestamp:
        type: timestamp
        description: Timestamp of the feedback event.

  dim_artists:
    description: Deduplicated artist dimension table.
    type: table
    fields:
      artist_id:
        type: string
        description: Unique identifier for the artist.
        required: true
        primary: true
      artist_mbid:
        type: string
        description: External identifier for the artist.
      artist_name:
        type: string
        description: Name of the artist or band.

  dim_songs:
    description: Song dimension table with artist linkage.
    type: table
    fields:
      song_id:
        type: string
        description: Unique identifier for the song.
        required: true
        primary: true
      artist_id:
        type: string
        description: Foreign key to dim_artists.
      track_id:
        type: string
        description: Secondary tracking identifier.
      title:
        type: string
        description: Title of the song.
      release:
        type: string
        description: Genre or release category.
      year:
        type: integer
        description: Release year.

  dim_users:
    description: User dimension table with geography.
    type: table
    fields:
      user_id:
        type: string
        description: Unique identifier for the user.
        required: true
        primary: true
      user_lastname:
        type: string
        description: Last name of the user.
      user_name:
        type: string
        description: First name of the user.
      user_since:
        type: date
        description: Registration date.
      place_name:
        type: string
        description: City of the user.
      country_code:
        type: string
        description: Two-letter country code.

  interactions_per_artist_vw:
    description: Aggregated user interactions (likes, dislikes, skips) grouped by year, artist, and action type.
    type: view
    fields:
      interaction_year:
        type: integer
        description: Year of the interaction.
      artist_name:
        type: string
        description: Name of the artist.
      action:
        type: string
        description: Type of user interaction.
      total_interactions:
        type: integer
        description: Count of interactions for the given grouping.

  interactions_per_country_vw:
    description: Aggregated user interactions grouped by month, year, country, and action type.
    type: view
    fields:
      interaction_month:
        type: integer
        description: Month (1-12) of the interaction.
      interaction_year:
        type: integer
        description: Year of the interaction.
      country_code:
        type: string
        description: Two-letter country code.
      action:
        type: string
        description: Type of user interaction.
      total_interactions:
        type: integer
        description: Count of interactions for the given grouping.

quality:
  specification: soda
  rules:
    - row_count(fact_session) > 0
    - row_count(fact_feedback) > 0
    - row_count(interactions_per_artist_vw) > 0
    - row_count(interactions_per_country_vw) > 0
    - duplicate_count(fact_session.session_id) = 0
    - duplicate_count(dim_artists.artist_id) = 0
    - duplicate_count(dim_users.user_id) = 0

servicelevels:
  availability:
    percentage: 99.9
  freshness:
    timestampField: session_start_time
    maxDelay: 24h
